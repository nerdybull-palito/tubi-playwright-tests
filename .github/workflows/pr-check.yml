name: PR Smoke Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-smoke-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  smoke-check:
    name: PR Smoke Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        id: smoke
        run: npx playwright test --grep @smoke --project=chromium --reporter=github,json
        env:
          CI: true
          BASE_URL: https://tubitv.com
        continue-on-error: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number }}-smoke-report
          path: |
            playwright-report/
            test-results/
          retention-days: 3

      - name: Post PR comment with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.smoke.outcome }}';
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const icon = outcome === 'success' ? '✅' : '❌';
            const status = outcome === 'success' ? 'All smoke tests passed' : 'Some smoke tests failed';
            const body = `## ${icon} Playwright Smoke Tests — ${status}\n\n` +
              `**Branch:** \`${{ github.head_ref }}\`\n` +
              `**Commit:** \`${{ github.sha }}\`\n\n` +
              `[View full test report](${runUrl})\n\n` +
              `> Smoke tests run on Chromium. Full regression runs on merge to \`main\`.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if smoke tests failed
        if: steps.smoke.outcome == 'failure'
        run: exit 1