name: Tubi Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Uncomment schdule when wanting to do nightly test
  #schedule:
    # Run full regression nightly at 2 AM UTC
    # - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - all
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  BASE_URL: 'https://tubitv.com'

jobs:
  # ─── Lint & Type Check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

  # ─── Smoke Tests ────────────────────────────────────────────────────────────
  smoke:
    name: Smoke Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run smoke tests
        run: npx playwright test --grep @smoke --project=${{ matrix.browser }}
        env:
          CI: true
          BASE_URL: ${{ env.BASE_URL }}
          ### Uncomment when using Credentials to login
          #TUBI_TEST_EMAIL: ${{ secrets.TUBI_TEST_EMAIL }}
          #TUBI_TEST_PASSWORD: ${{ secrets.TUBI_TEST_PASSWORD }}
          ###

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ─── Full Regression ─────────────────────────────────────────────────────────
  regression:
    name: Regression Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: smoke
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test_suite != 'smoke') ||
      github.ref == 'refs/heads/main'
      
    #
      # Add this to "if" when you what to add nightly regression testing
      #github.event_name == 'schedule' ||
      #(github.event_name == 'workflow_dispatch' && github.event.inputs.test_suite != 'smoke') ||
      #github.ref == 'refs/heads/main'
    #

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run regression tests (shard ${{ matrix.shard }}/4)
        run: |
          npx playwright test \
            --grep @regression \
            --project=${{ matrix.browser }} \
            --shard=${{ matrix.shard }}/4
        env:
          CI: true
          BASE_URL: ${{ env.BASE_URL }}
          ### Uncomment when using Credentials to login
          #TUBI_TEST_EMAIL: ${{ secrets.TUBI_TEST_EMAIL }}
          #TUBI_TEST_PASSWORD: ${{ secrets.TUBI_TEST_PASSWORD }}
          ###

      - name: Upload regression test blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-blob-${{ matrix.browser }}-shard${{ matrix.shard }}
          path: blob-report/
          retention-days: 3

  # ─── Merge Sharded Reports ────────────────────────────────────────────────────
  merge-reports:
    name: Merge & Publish Reports
    runs-on: ubuntu-latest
    needs: regression
    if: always() && needs.regression.result != 'skipped'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: regression-blob-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge Playwright reports
        run: npx playwright merge-reports --reporter html,json ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: full-regression-report
          path: playwright-report/
          retention-days: 30

      - name: Upload JUnit results
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: test-results/junit.xml
          retention-days: 30

  # ─── Mobile Tests ─────────────────────────────────────────────────────────────
  mobile:
    name: Mobile Tests
    runs-on: ubuntu-latest
    needs: smoke
    if: github.ref == 'refs/heads/main'
    # Add this to "if" when you want to add nightly regression testing
    # github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        project: [mobile-chrome, mobile-safari]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run mobile tests
        run: npx playwright test --grep @smoke --project=${{ matrix.project }}
        env:
          CI: true
          BASE_URL: ${{ env.BASE_URL }}

      - name: Upload mobile test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-results-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7


